<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Life</title>

  <!-- Cross-Origin Isolation for SharedArrayBuffer (Stockfish WASM) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/coi-serviceworker.js').then(() => {
        if (!crossOriginIsolated) location.reload();
      });
    }
  </script>

  <!-- DaisyUI 5 + Tailwind CSS 4 via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/daisyui.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Pixel art font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/ui.css">
</head>
<body>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto"
         src="assets/Sounds/Music/cfl_turningpages-subtle-pixel-glow-462740.mp3"></audio>
  <button id="btn-music" class="music-toggle music-on" title="Music ON/OFF">♫ ON</button>
  <button id="btn-sfx" class="music-toggle music-on" title="Sound FX ON/OFF">SFX ON</button>

  <!-- ══════════════════════════════════════════════════════════════
       SCREEN: GAME
  ══════════════════════════════════════════════════════════════ -->
  <div id="screen-game">

    <div id="app">

      <!-- Left sidebar -->
      <div id="sidebar">
        <div id="player-info">
          <div class="label">Your Elo</div>
          <div id="player-elo">800</div>
        </div>
        <div id="opponent-info">
          <div class="label">Opponent</div>
          <div id="opponent-name">—</div>
          <div id="opponent-elo">—</div>
        </div>
        <div id="focus-section">
          <div class="label">Focus</div>
          <!-- Flow State auto-activated (no button) -->
          <button id="btn-flow-state" class="flow-btn hidden" aria-hidden="true"></button>
          <div id="focus-bar-wrap">
            <div id="focus-bar"></div>
            <div id="focus-bar-gold"></div>
          </div>
          <div id="focus-value">100%</div>
          <div id="flow-status" class="flow-status"></div>
        </div>
        <div id="stockfish-section">
          <div class="label">Stockfish analysis</div>
          <div class="tooltip w-full" id="tooltip-sf3" data-tip="">
            <button class="sf-btn w-full" id="btn-sf3">N3 — Best move (-22%)</button>
          </div>
          <div id="sf-feedback">Activate Stockfish to analyze the position.</div>
          <button class="sf-btn w-full" id="btn-takeback" style="margin-top:6px;">Takeback (-30%)</button>
          <button class="sf-btn w-full intuition-btn hidden" id="btn-intuition" style="margin-top:6px;">
            ✦ Intuition
          </button>
        </div>
        <div id="game-controls">
          <button id="btn-new-game">New game</button>
          <div id="game-status">Start a game to begin.</div>
        </div>
      </div>

      <!-- Center board -->
      <div id="board-section">
        <div id="captured-black"></div>
        <div id="board-container">
          <div id="board"></div>
        </div>
        <div id="captured-white"></div>
      </div>

      <!-- Right move history -->
      <div id="move-history">
        <div class="label">History</div>
        <div id="moves-list"></div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       MODAL: PROMOTION
  ══════════════════════════════════════════════════════════════ -->
  <dialog id="promotion-modal" class="modal">
    <div class="modal-box bg-base-200 border border-primary/30 text-center">
      <h3 class="font-bold mb-4" style="font-family:'Press Start 2P',monospace;font-size:11px;">Promotion — pick a piece</h3>
      <div id="promotion-choices" class="flex gap-4 justify-center"></div>
    </div>
  </dialog>

  <!-- ══════════════════════════════════════════════════════════════
       MODAL: COLOR CHOICE
  ══════════════════════════════════════════════════════════════ -->
  <dialog id="modal-color-choice" class="modal">
    <div class="modal-box bg-base-200 border border-primary/30 text-center" style="max-width:360px;">
      <h3 class="font-bold mb-5" style="font-family:'Press Start 2P',monospace;font-size:11px;color:#e8c98a;">
        Pick your side
      </h3>
      <div class="flex justify-center gap-4 mb-2">
        <button id="pick-white" class="color-pick-btn" title="Play White">
          <img src="assets/pieces/wK.png" alt="White" class="color-pick-img">
          <span class="color-pick-label">White</span>
        </button>
        <button id="pick-random" class="color-pick-btn color-pick-random" title="Random">
          <span class="color-pick-dice">?</span>
          <span class="color-pick-label">Random</span>
        </button>
        <button id="pick-black" class="color-pick-btn" title="Play Black">
          <img src="assets/pieces/bK.png" alt="Black" class="color-pick-img">
          <span class="color-pick-label">Black</span>
        </button>
      </div>
    </div>
  </dialog>

  <!-- ══════════════════════════════════════════════════════════════
       MODAL: POST-GAME REVIEW
  ══════════════════════════════════════════════════════════════ -->
  <dialog id="modal-review" class="modal">
    <div class="modal-box w-full max-w-4xl max-h-[90vh] overflow-y-auto bg-base-200">
      <h2 class="font-bold mb-4" style="font-family:'Press Start 2P',monospace;font-size:13px;">Post-game review</h2>

      <!-- Progress bar during analysis -->
      <div id="review-progress-wrap">
        <progress id="review-progress" class="progress progress-primary w-full"
                  value="0" max="100"></progress>
        <p id="review-progress-text" class="text-sm text-center mt-2 opacity-60">
          Analyzing…
        </p>
      </div>

      <!-- Results (hidden during analysis) -->
      <div id="review-results" class="hidden">
        <div id="review-chart" class="mb-6 max-h-64 overflow-y-auto"></div>
        <h3 class="font-bold mb-3" style="font-family:'Press Start 2P',monospace;font-size:10px;">Key moments</h3>
        <div id="review-moments" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4"></div>
      </div>

      <div class="modal-action">
        <button id="btn-close-review" class="btn">Close</button>
      </div>
    </div>
  </dialog>

  <!-- Loading overlay for Maia model -->
  <div id="maia-loading-bar" class="hidden"
       style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
              background:#1a1a2e;border:2px solid #e8c98a;padding:12px 20px;
              z-index:1000;min-width:280px;font-family:'Press Start 2P',monospace;">
    <progress id="maia-loading-progress" class="progress progress-info w-full h-2"
              value="0" max="100"></progress>
    <p id="maia-loading-text" class="text-xs text-center opacity-70 mt-2"
       style="color:#e0d8c8;">Loading AI…</p>
  </div>

  <!-- Fade transition overlay -->
  <div id="screen-fade" class="screen-fade"></div>

  <!-- ── SCRIPTS (dependency order) ── -->
  <script src="lib/chess.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
  <script src="js/save-manager.js"></script>
  <script src="js/sound-manager.js"></script>
  <script src="js/focus-system.js"></script>
  <script src="js/career-manager.js"></script>
  <script src="js/dialog-system.js"></script>
  <script src="js/chess-engine.js"></script>
  <script src="js/maia-engine.js"></script>
  <script src="js/review-manager.js"></script>
  <script src="js/ui-manager.js"></script>

</body>
</html>
